<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#08141F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Atlantis Academy" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>Atlantis Academy</title>
    <style>
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; }
      .atlantis-shell { max-width: 480px; margin: 0 auto; width: 100%; }
      .atlantis-sidenav { display: none; }
      @media (min-width: 768px) {
        .atlantis-shell { max-width: 1100px; }
        .atlantis-body { flex-direction: row !important; }
        .atlantis-sidenav { display: flex !important; }
        .atlantis-bottomnav { display: none !important; }
        .atlantis-content-scroll { padding-left: 28px !important; padding-right: 28px !important; }
        .atlantis-cardgrid { display: grid !important; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .atlantis-cardgrid > * { margin-bottom: 0 !important; }
      }
      @media (min-width: 1100px) {
        .atlantis-cardgrid { grid-template-columns: repeat(3, 1fr); }
      }
    </style>
  </head>
  <body style="margin:0; background:#08141F;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
